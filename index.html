<script>
window.onload = function() {

    if (r < 0.33) {

    } else if (r < 0.66) {
        window.location.href = "https://survey.mailing.lu.se/Survey/64875";

    } else {
        window.location.href = "https://survey.mailing.lu.se/Survey/64874"; // heavily limited
    }
};
</script>
