<!DOCTYPE html>
<html>

<meta charset="UTF-8">
<title>Survey Redirect</title>
<script>
window.onload = function() {
    var r = Math.random();

    if (r < 0.05) {
        window.location.href = "https://survey.mailing.lu.se/Survey/64872"; // 1
    } else if (r < 0.10) {
        window.location.href = "https://survey.mailing.lu.se/Survey/64871"; // 2
    } else if (r < 0.55) {
        window.location.href = "https://survey.mailing.lu.se/Survey/64875"; // 3
    } else {
        window.location.href = "https://survey.mailing.lu.se/Survey/64874"; // 4
    }
};
</script>
</head>
